<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>全景助手控制台</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
    }

    body.app-boot-pending {
      overflow: hidden;
      background:
        radial-gradient(1200px 520px at 12% -6%, rgba(0, 126, 167, 0.14), transparent 56%),
        radial-gradient(900px 460px at 100% 0%, rgba(0, 103, 209, 0.12), transparent 52%),
        #e9eff3;
    }

    #app-boot-overlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(233, 239, 243, 0.28);
      backdrop-filter: blur(20px) saturate(130%);
      -webkit-backdrop-filter: blur(20px) saturate(130%);
      transition: opacity 220ms ease, visibility 220ms ease;
    }

    #app-boot-overlay.is-hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .app-runtime-overlay {
      position: fixed;
      inset: 0;
      z-index: 9000;
      display: grid;
      place-items: center;
      padding: 24px;
      background: rgba(233, 239, 243, 0.32);
      backdrop-filter: blur(18px) saturate(128%);
      -webkit-backdrop-filter: blur(18px) saturate(128%);
    }

    .app-runtime-overlay-card {
      min-width: min(340px, calc(100vw - 48px));
      max-width: 440px;
      padding: 30px 34px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.68), rgba(255, 255, 255, 0.40));
      box-shadow: 0 26px 60px rgba(16, 38, 53, 0.18);
      text-align: center;
      color: #173247;
    }

    .app-runtime-overlay-kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.48);
      border: 1px solid rgba(255, 255, 255, 0.56);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(23, 50, 71, 0.74);
    }

    .app-runtime-overlay-title {
      margin: 16px 0 0;
      font-family: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: clamp(24px, 4vw, 30px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .app-runtime-overlay-subtitle {
      margin: 10px 0 0;
      font-family: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(23, 50, 71, 0.74);
    }

    .app-runtime-overlay-progress {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 8px;
      margin: 22px 0 0;
      border-radius: 999px;
      background: rgba(23, 50, 71, 0.10);
    }

    .app-runtime-overlay-progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, #007ea7, #0067d1);
      animation: app-boot-progress 1.15s ease-in-out infinite;
    }

    .app-boot-card {
      min-width: min(320px, calc(100vw - 48px));
      max-width: 420px;
      padding: 28px 32px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.58);
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.62), rgba(255, 255, 255, 0.38));
      box-shadow: 0 26px 60px rgba(16, 38, 53, 0.16);
      text-align: center;
      color: #173247;
    }

    .app-boot-kicker {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.46);
      border: 1px solid rgba(255, 255, 255, 0.56);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(23, 50, 71, 0.74);
    }

    .app-boot-title {
      margin: 16px 0 0;
      font-family: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: clamp(24px, 4vw, 30px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .app-boot-subtitle {
      margin: 10px 0 0;
      font-family: "Source Han Sans SC", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: rgba(23, 50, 71, 0.74);
    }

    .app-boot-progress {
      position: relative;
      overflow: hidden;
      width: 100%;
      height: 8px;
      margin: 22px 0 0;
      border-radius: 999px;
      background: rgba(23, 50, 71, 0.10);
    }

    .app-boot-progress::after {
      content: "";
      position: absolute;
      inset: 0;
      width: 42%;
      border-radius: inherit;
      background: linear-gradient(90deg, #007ea7, #0067d1);
      animation: app-boot-progress 1.15s ease-in-out infinite;
    }

    @keyframes app-boot-progress {
      0% {
        transform: translateX(-120%);
      }
      100% {
        transform: translateX(340%);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #app-boot-overlay,
      .app-boot-progress::after,
      .app-runtime-overlay-progress::after {
        transition: none;
        animation: none;
      }

      .app-boot-progress::after,
      .app-runtime-overlay-progress::after {
        width: 100%;
        transform: none;
      }
    }
  </style>
  <link rel="stylesheet" href="/assets/style.css" />
</head>
<body class="app-boot-pending">
  <div id="app-boot-overlay" aria-live="polite" aria-busy="true" role="status">
    <div class="app-boot-card">
      <div class="app-boot-kicker">启动中</div>
      <div class="app-boot-title">正在打开中</div>
      <div class="app-boot-subtitle">前端资源加载完成后将自动进入对应角色页面。</div>
      <div class="app-boot-progress" aria-hidden="true"></div>
    </div>
  </div>
  <div id="app"></div>
  <script src="/assets/vue.global.prod.js"></script>
  <script type="module" src="/assets/app.js"></script>
</body>
</html>
